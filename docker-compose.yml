name: siaspri

services:
    app:
        image: siaspri:latest
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        restart: unless-stopped
        working_dir: /var/www
        init: true
        env_file:
            - .env
        environment:
            APP_ENV: production
        volumes:
            - public_assets:/var/www/public
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_started
        healthcheck:
            test: pgrep -x php-fpm > /dev/null || exit 1
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 30s
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"

    queue:
        image: siaspri:latest
        working_dir: /var/www
        command: php artisan queue:work redis --tries=3 --timeout=300 --sleep=3 --max-time=3600
        restart: unless-stopped
        init: true
        stop_signal: SIGTERM
        env_file:
            - .env
        environment:
            APP_ENV: production
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_started
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"

    scheduler:
        image: siaspri:latest
        working_dir: /var/www
        command: php artisan schedule:work
        restart: unless-stopped
        init: true
        env_file:
            - .env
        environment:
            APP_ENV: production
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_started
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"

    web:
        image: nginx:latest
        restart: unless-stopped
        init: true
        ports:
            - "${HTTP_PORT:-8080}:80"
            - "${HTTPS_PORT:-8443}:443"
        volumes:
            - public_assets:/var/www/public:ro
            - ./docker/nginx/${NGINX_CONFIG:-production}.conf:/etc/nginx/conf.d/default.conf
            - ./docker/nginx/ssl:/etc/nginx/ssl:ro
        depends_on:
            - app
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"

    postgres:
        image: postgres:17
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${DB_DATABASE}
            POSTGRES_USER: ${DB_USERNAME}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
            interval: 10s
            timeout: 5s
            retries: 5
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"

    redis:
        image: redis:8-alpine
        restart: unless-stopped
        volumes:
            - redis_data:/data
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"

volumes:
    postgres_data:
    redis_data:
    public_assets:

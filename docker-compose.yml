name: siaspri

services:
    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        restart: unless-stopped
        working_dir: /var/www
        tty: true
        init: true
        volumes:
            - ./:/var/www
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_started

    queue:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        working_dir: /var/www
        command: php artisan queue:work redis --tries=3 --timeout=300 --sleep=3 --max-time=3600
        restart: unless-stopped
        tty: true
        init: true
        stop_signal: SIGTERM
        volumes:
            - ./:/var/www
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_started

    scheduler:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        working_dir: /var/www
        command: php artisan schedule:work
        restart: unless-stopped
        tty: true
        init: true
        volumes:
            - ./:/var/www
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_started

    web:
        image: nginx:latest
        restart: unless-stopped
        ports:
            - "${HTTP_PORT:-8080}:80"
            - "${HTTPS_PORT:-8443}:443"
        volumes:
            - ./:/var/www
            - ./docker/nginx/${NGINX_CONFIG:-default}.conf:/etc/nginx/conf.d/default.conf
            - ./docker/nginx/ssl:/etc/nginx/ssl:ro
        depends_on:
            - app

    vite:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        working_dir: /var/www
        command: sh -c "corepack enable && pnpm run dev -- --host 0.0.0.0"
        restart: unless-stopped
        tty: true
        init: true
        volumes:
            - ./:/var/www
        ports:
            - "5173:5173"
        depends_on:
            - app

    postgres:
        image: postgres:17
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${DB_DATABASE}
            POSTGRES_USER: ${DB_USERNAME}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        ports:
            - "${POSTGRES_PORT:-5433}:5432"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:8-alpine
        restart: unless-stopped
        volumes:
            - redis_data:/data

volumes:
    postgres_data:
    redis_data:

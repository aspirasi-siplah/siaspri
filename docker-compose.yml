name: siaspri

x-php-image: &php-image
  image: siaspri:latest
  build:
    context: .
    dockerfile: docker/php/Dockerfile

x-app-environment: &app-environment
  APP_NAME: ${APP_NAME:-Siaspri}
  APP_ENV: ${APP_ENV:-production}
  APP_KEY: ${APP_KEY:-}
  APP_DEBUG: ${APP_DEBUG:-false}
  APP_URL: ${APP_URL:-https://localhost}
  DB_CONNECTION: ${DB_CONNECTION:-pgsql}
  DB_HOST: ${DB_HOST:-postgres}
  DB_PORT: ${DB_PORT:-5432}
  DB_DATABASE: ${DB_DATABASE:-siaspri}
  DB_USERNAME: ${DB_USERNAME:-postgres}
  DB_PASSWORD: ${DB_PASSWORD:-postgres}
  SESSION_DRIVER: ${SESSION_DRIVER:-database}
  CACHE_STORE: ${CACHE_STORE:-redis}
  QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
  REDIS_CLIENT: ${REDIS_CLIENT:-phpredis}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-null}
  REDIS_PORT: ${REDIS_PORT:-6379}

x-service-logging: &service-logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '3'

services:
  bootstrap:
    <<: *php-image
    working_dir: /var/www
    command: docker-bootstrap.sh
    restart: 'no'
    init: true
    env_file:
      - .env
    environment:
      <<: *app-environment
    volumes:
      - public_assets:/var/www/public
      - storage_data:/var/www/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    logging: *service-logging

  app:
    <<: *php-image
    restart: unless-stopped
    working_dir: /var/www
    init: true
    env_file:
      - .env
    environment:
      <<: *app-environment
    volumes:
      - public_assets:/var/www/public
      - storage_data:/var/www/storage
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', 'grep -q php-fpm /proc/1/cmdline || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *service-logging

  queue:
    <<: *php-image
    working_dir: /var/www
    command: php artisan queue:work --tries=3 --timeout=300 --sleep=3 --max-time=3600
    restart: unless-stopped
    init: true
    stop_signal: SIGTERM
    env_file:
      - .env
    environment:
      <<: *app-environment
    volumes:
      - storage_data:/var/www/storage
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_started
    logging: *service-logging

  scheduler:
    <<: *php-image
    working_dir: /var/www
    command: php artisan schedule:work
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      <<: *app-environment
    volumes:
      - storage_data:/var/www/storage
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    logging: *service-logging

  web:
    image: siaspri-nginx:latest
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    restart: unless-stopped
    init: true
    ports:
      - '${HTTP_PORT:-8080}:80'
      - '${HTTPS_PORT:-8443}:443'
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      APP_FPM_HOST: ${APP_FPM_HOST:-app:9000}
      NGINX_CONFIG: ${NGINX_CONFIG:-production}
    volumes:
      - public_assets:/var/www/public:ro
      - storage_data:/var/www/storage:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      app:
        condition: service_healthy
    logging: *service-logging

  postgres:
    image: postgres:17
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_DATABASE:-siaspri}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-5433}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *service-logging

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    logging: *service-logging

volumes:
  postgres_data:
  redis_data:
  public_assets:
  storage_data:

name: siaspri-production

services:
    app:
        environment:
            APP_ENV: production
            APP_DEBUG: false
            APP_URL: https://siapri.com

    web:
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./:/var/www
            - ./docker/nginx/production.conf:/etc/nginx/conf.d/default.conf
            - ./docker/nginx/ssl:/etc/nginx/ssl:ro

    vite:
        profiles:
            - production-dont-use

volumes:
    postgres_data:
    redis_data:

services:
    app:
        volumes:
            - ./:/var/www

    queue:
        volumes:
            - ./:/var/www

    scheduler:
        volumes:
            - ./:/var/www

    web:
        volumes:
            - ./:/var/www
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    vite:
        image: node:22-alpine
        working_dir: /var/www/
        command: sh -c "corepack enable && ( [ -d node_modules/.pnpm ] || pnpm install --frozen-lockfile --prefer-offline ) && pnpm run dev -- --host 0.0.0.0"
        restart: unless-stopped
        init: true
        environment:
            WAYFINDER_COMMAND: "true"
        volumes:
            - ./:/var/www
            - node_modules:/var/www/node_modules
        ports:
            - "5173:5173"
        depends_on:
            - app

    postgres:
        ports:
            - "${POSTGRES_PORT:-5432}:5432"

volumes:
    node_modules:
